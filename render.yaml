services:
  # ────────────────────────────────────────────────────────
  # BACKEND SERVICE (FastAPI)
  # ────────────────────────────────────────────────────────
  - type: web
    name: biometric-backend
    env: python
    plan: free
    region: oregon # you can change this
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SERPAPI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false

  # ────────────────────────────────────────────────────────
  # FRONTEND SERVICE (Vite Static Site)
  # ────────────────────────────────────────────────────────
  - type: web
    name: biometric-frontend
    env: static
    buildCommand: "yarn install && yarn build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      # This connects the frontend directly to the backend deployed above
      - key: VITE_API_URL
        fromService:
          type: web
          name: biometric-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_POSTHOG_KEY
        sync: false
      - key: VITE_POSTHOG_HOST
        sync: false
